<div class="page">
  <div class="page-header">
    <h1>Track Package #{{ packageId }}</h1>
    <p>View the latest status and depot for this package.</p>
  </div>

  <div class="card">
    @if (error) {
      <p class="error">{{ error }}</p>
    }

    @if (status) {
      <div class="status-box">
        <div class="status-row">
          <span class="label">Status</span>
          <span class="value">
            <span class="badge {{ status.status.toLowerCase() }}">
              {{ status.status }}
            </span>
          </span>
        </div>

        <div class="status-row">
          <span class="label">Current Depot</span>
          <span class="value">{{ status.currentDepotId || '—' }}</span>
        </div>

        <div class="status-row">
          <span class="label">Last Updated</span>
          <span class="value">{{ status.timestamp || '—' }}</span>
        </div>
      </div>
    }

    <button class="btn" (click)="goBack()">Back to My Deliveries</button>
  </div>
</div>
