<div class="delivery-request-container">
  <h2>Request a Delivery</h2>

  @if (error) {
    <p class="error">{{ error }}</p>
  }
  @if (success) {
    <p class="success">{{ success }}</p>
  }

  <div class="form">
    <label>Pickup Location</label>
    <input type="text" [(ngModel)]="pickup" placeholder="Enter pickup location" />

    <label>Destination Address</label>
    <input type="text" [(ngModel)]="destination" placeholder="Enter destination" />

    <button (click)="submitRequest()">Submit Request</button>
  </div>
</div>
