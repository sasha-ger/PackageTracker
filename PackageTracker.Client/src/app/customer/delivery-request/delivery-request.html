<div class="page">
  <div class="page-header">
    <h1>Request a Delivery</h1>
    <p>Create a new delivery from a depot to a destination address.</p>
  </div>

  <div class="card">
    @if (error) {
      <p class="error">{{ error }}</p>
    }

    @if (success) {
      <p class="success">{{ success }}</p>
    }

    <div class="form-group">
      <label>Pickup Depot</label>
      <select class="input" [(ngModel)]="pickupDepotId">
        <option [ngValue]="null" disabled selected>Select a depot</option>
        @for (id of depotIds; track id) {
          <option [ngValue]="id">{{ depotMap[id] }}</option>
        }
      </select>
    </div>

    <div class="form-group">
      <label>Destination Address</label>
      <input
        class="input"
        type="text"
        [(ngModel)]="destinationAddress"
        placeholder="123 Main St, Lincoln NE"
      />
    </div>

    <button class="btn" (click)="submitRequest()">Submit Request</button>
  </div>
</div>
