<div class="page">
  <div class="page-header">
    <h1>Request a Delivery</h1>
    <p>Create a new delivery by entering pickup and destination coordinates.</p>
  </div>

  <div class="card">

    @if (error) {
      <p class="error">{{ error }}</p>
    }

    @if (success) {
      <p class="success">{{ success }}</p>
    }

    <div class="section-title">Pickup Location</div>

    <div class="form-group">
      <label>Pickup Address</label>
      <input class="input" [(ngModel)]="pickup.address" placeholder="123 Main St" />
    </div>

    <div class="form-row">
      <div class="form-group half">
        <label>Pickup Latitude</label>
        <input class="input" type="number" [(ngModel)]="pickup.latitude" />
      </div>

      <div class="form-group half">
        <label>Pickup Longitude</label>
        <input class="input" type="number" [(ngModel)]="pickup.longitude" />
      </div>
    </div>

    <!-- DESTINATION -->
    <div class="section-title">Destination Location</div>

    <div class="form-group">
      <label>Destination Address</label>
      <input class="input" [(ngModel)]="destination.address" placeholder="500 Vine St" />
    </div>

    <div class="form-row">
      <div class="form-group half">
        <label>Destination Latitude</label>
        <input class="input" type="number" [(ngModel)]="destination.latitude" />
      </div>

      <div class="form-group half">
        <label>Destination Longitude</label>
        <input class="input" type="number" [(ngModel)]="destination.longitude" />
      </div>
    </div>

    <!-- CLOSEST DEPOT -->
    <div class="closest-box" *ngIf="closestDepot">
      <p><strong>Closest Depot:</strong> {{ closestDepot.name }}</p>
    </div>

    <button class="btn" (click)="submitRequest()">Submit Request</button>
  </div>
</div>
