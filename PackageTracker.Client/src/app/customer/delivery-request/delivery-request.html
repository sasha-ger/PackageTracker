<div class="delivery-request-container">
  <h2>Request a Delivery</h2>

  @if (error) {
    <p class="error">{{ error }}</p>
  }
  @if (success) {
    <p class="success">{{ success }}</p>
  }

<div class="form">
  <label>Pickup Latitude</label>
  <input type="number" [(ngModel)]="pickupLat" placeholder="Enter pickup latitude" />

  <label>Pickup Longitude</label>
  <input type="number" [(ngModel)]="pickupLng" placeholder="Enter pickup longitude" />

  <label>Destination Latitude</label>
  <input type="number" [(ngModel)]="destLat" placeholder="Enter destination latitude" />

  <label>Destination Longitude</label>
  <input type="number" [(ngModel)]="destLng" placeholder="Enter destination longitude" />

  <button (click)="submitRequest()">Submit Request</button>
</div>

</div>
